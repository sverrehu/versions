name: Publish package
on:
  release:
    types: [created]
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.1'

      - name: Build
        run: |
          VERSION="$(grep -Po '\d+\.\d+\.\d+' .release-please-manifest.json)"
          PACKAGE="$(echo "${{ github.repository }}" | sed -e 's/.*\///')"
          mkdir builds
          env CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o builds/"${PACKAGE}-${VERSION}"-linux-amd64

      - name: Push GitHub release artifact
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: builds/*
