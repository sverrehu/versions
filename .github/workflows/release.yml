---
name: Release package
on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Build
        run: |
          VERSION="$(grep -Po '\d+\.\d+\.\d+' .release-please-manifest.json)"
          PACKAGE="$(echo "${{ github.repository }}" | sed -e 's/.*\///')"
          mkdir builds
          env CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -a -trimpath -ldflags="-s -w" -o builds/"${PACKAGE}-${VERSION}"-linux-amd64

      - name: Push GitHub release artifact
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: builds/*
